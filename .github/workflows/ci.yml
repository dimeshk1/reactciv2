name: CI/CD - Build, Push, and Deploy to EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 107282187171
  ECR_REPOSITORY: react-hello-world
  EKS_CLUSTER_NAME: react-hello-world-dev
  K8S_NAMESPACE: github-actions
  K8S_DEPLOYMENT_NAME: react-hello-world
  K8S_CONTAINER_NAME: react-app

jobs:
  build:

    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::107282187171:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY .

      - name: Tag Docker image
        run: |
          docker tag $ECR_REPOSITORY:latest ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$GITHUB_SHA

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$GITHUB_SHA

      - name: Resolve image digest
        id: image
        run: |
          IMAGE_URI=$(docker inspect --format='{{index .RepoDigests 0}}' \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$GITHUB_SHA)

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "Deploying image: $IMAGE_URI"

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::107282187171:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Preflight identity and cluster access
        run: |
          set -euo pipefail
          echo "AWS caller identity:"
          aws sts get-caller-identity

          echo "Kubernetes client version:"
          kubectl version --client

          echo "Current kubectl context:"
          kubectl config current-context

          echo "Checking RBAC for namespace access..."
          if ! kubectl auth can-i get pods -n $K8S_NAMESPACE; then
            echo "ERROR: Current IAM role can reach EKS but is not authorized for Kubernetes API actions in namespace '$K8S_NAMESPACE'."
            echo "Fix by granting this CI role cluster access (EKS access entry or aws-auth mapping)."
            exit 1
          fi

      - name: Apply Kubernetes manifests
        run: |
          # Namespace is a cluster-scoped resource and is intentionally excluded here.
          # The CI role is granted namespace-scoped access only (least privilege),
          # so it cannot manage cluster-scoped objects like Namespace.
          # namespace.yaml must be applied once by a cluster-admin identity instead.
          for f in k8s/*.yaml; do
            if [ "$(basename "$f")" != "namespace.yaml" ]; then
              kubectl apply -f "$f"
            fi
          done

      - name: Rollout deployment with immutable digest image
        run: |
          kubectl -n $K8S_NAMESPACE set image deployment/$K8S_DEPLOYMENT_NAME $K8S_CONTAINER_NAME=${{ needs.build.outputs.image_uri }}
          kubectl -n $K8S_NAMESPACE rollout status deployment/$K8S_DEPLOYMENT_NAME --timeout=5m