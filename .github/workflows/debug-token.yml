name: Debug OIDC Token

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Get Token with sts.amazonaws.com audience
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r .value)
          echo "=== sts.amazonaws.com audience ==="
          echo "$TOKEN" | cut -d "." -f2 | base64 -d | jq '.'
          
      - name: Get Token with api://demo audience
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://demo" | jq -r .value)
          echo "=== api://demo audience ==="
          echo "$TOKEN" | cut -d "." -f2 | base64 -d | jq '.'