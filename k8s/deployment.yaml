apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-hello-world
  namespace: github-actions
  labels:
    app: react-hello-world
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-hello-world
  template:
    metadata:
      labels:
        app: react-hello-world
    spec:
      containers:
      - name: react-app
        image: 107282187171.dkr.ecr.us-east-1.amazonaws.com/react-hello-world:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
